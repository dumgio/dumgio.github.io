---
layout: default
---

<nav style="margin-bottom: 2rem;">
  <a href="{{ '/' | relative_url }}" style="text-decoration: none; font-family: var(--body-font); font-size: 1rem; opacity: 0.7;">‹ Indietro</a>
</nav>

<article class="page-container">
  <header style="margin-bottom: 3rem;">
    <h1 style="font-size: 2.2rem; line-height: 1.2; margin-bottom: 0.5rem; margin-top: 0;">
      {{ page.title }}
    </h1>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>

<style>
  .page-content {
    line-height: 1.7;
  }
  .page-content p {
    margin-bottom: 1.8rem;
  }
  .page-content h2, .page-content h3 {
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }
</style>
