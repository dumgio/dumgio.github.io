---
layout: default
---

<nav class="page-back-nav">
  <a href="{{ '/' | relative_url }}">‹ Indietro</a>
</nav>

<article class="post-container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date: '%Y-%m-%d' }}" class="post-time">
      {{ page.date | date: "%d.%m.%Y" }}
    </time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <div class="share-section">
      <p class="share-label">Condividi questo appunto:</p>
      <div class="share-links">
        <a href="https://wa.me/?text={{ page.title | url_encode }}%20{{ site.url }}{{ page.url | url_encode }}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url | url_encode }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <button onclick="copyLink()" id="copy-btn">Copia Link</button>
      </div>
    </div>
  </footer>
</article>

<script>
function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.innerText = 'Link copiato';
    setTimeout(() => { btn.innerText = 'Copia Link'; }, 2000);
  });
}
</script>
