---
layout: default
---
<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: "%d.%m.%Y" }}</time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  /* Contenitore principale */
  .post-container {
    text-align: left;
  }

  .post-header {
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column; /* Mette la data SOTTO il titolo */
    align-items: flex-start; /* Allinea tutto a sinistra */
  }

  /* Titolo più piccolo e pulito */
  .post-title {
    font-size: 1.6rem; /* Dimensione ridotta */
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.4rem;
    color: var(--fg);
    text-align: left;
  }

  /* Data */
  .post-date {
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 500;
    text-align: left;
  }

  /* Testo dell'appunto */
  .post-content {
    text-align: left;
  }

  .post-content p {
    margin-bottom: 1.5rem;
    font-size: 1.05rem;
    line-height: 1.6;
  }

  /* Correzione per Mobile: forza l'allineamento a sinistra */
  @media (max-width: 600px) {
    .post-header, .post-title, .post-date, .post-content {
      text-align: left !important;
      align-items: flex-start !important;
    }
  }
</style>
