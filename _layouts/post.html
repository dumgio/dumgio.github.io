
---
layout: default
---
<article class="post-container">
  <header style="border-bottom: none; display: block; margin-bottom: 2rem; padding-bottom: 0;">
    <h1 style="font-size: 1.6rem; font-weight: 600; line-height: 1.2; margin-bottom: 0.5rem;">
      {{ page.title }}
    </h1>
    <time style="opacity: 0.6; font-size: 0.95rem;">
      {{ page.date | date: "%d %B %Y" }}
    </time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>

  <div class="share-section" style="font-size: 0.95rem;">
    <p style="opacity: 0.6; margin-bottom: 0.5rem; text-transform: lowercase;">Condividi questo appunto:</p>
    <div class="share-links" style="display: flex; gap: 1rem;">
      <a href="https://wa.me/?text={{ page.title | url_encode }}%20{{ site.url }}{{ page.url | url_encode }}" target="_blank">WhatsApp</a>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ page.url | url_encode }}" target="_blank">LinkedIn</a>
      <a href="javascript:void(0)" onclick="copyLink()" id="copy-btn">Copia Link</a>
    </div>
  </div>
</article>

<script>
function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.innerText = 'Link copiato';
    setTimeout(() => { btn.innerText = 'Copia Link'; }, 2000);
  });
}
</script>

<style>
  /* Pulizia contenuti post */
  .post-content p {
    margin-bottom: 1.5rem;
  }

  /* Stile per i link nel corpo del post se diversi dai link globali */
  .post-content a {
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  /* Share links seguono la logica Dave Lee: sottolineatura solo hover */
  .share-links a {
    text-decoration: none;
  }
  .share-links a:hover {
    text-decoration: underline;
    text-decoration-thickness: 0.1ex;
    text-underline-offset: 0.3ex;
  }
</style>
