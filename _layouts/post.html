---
layout: default
---
<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: "%d.%m.%Y" }}</time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post-container {
    text-align: left;
  }

  .post-header {
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column; 
    align-items: flex-start; 
  }

  .post-title {
    font-size: 1.5rem; 
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.3rem;
    color: var(--fg);
    text-align: left;
  }

  .post-date {
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 500;
    text-align: left;
    font-family: monospace;
  }

  .post-content {
    text-align: left;
    margin-top: 2.5rem;
  }

  @media (max-width: 600px) {
    .post-header, .post-title, .post-date, .post-content {
      text-align: left !important;
      align-items: flex-start !important;
    }
  }
</style>
