<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    {% seo %}

    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --muted: #666666;
            --link: inherit;
            --max-width: 640px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --muted: #999999;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            display: flex;
            flex-direction: column;
            justify-content: center;

            min-height: 100vh;
            padding: 2rem;
            max-width: var(--max-width);
            margin: 0 auto;

            line-height: 1.6;
        }

        main {
            width: 100%;
        }

        /* TIPOGRAFIA */

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        h1.logo {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
            opacity: 0.7;
        }

        h1.logo span {
            font-weight: 400;
            opacity: 0.5;
        }

        h2 {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 3rem;
            margin-bottom: 1rem;
            color: var(--muted);
            border: none;
        }

        p {
            margin-bottom: 1.2rem;
            max-width: 60ch;
        }

        em {
            font-style: italic;
        }

        strong {
            font-weight: 700;
        }

        /* LISTE */

        ul {
            list-style: none;
        }

        li {
            margin-bottom: 0.6rem;
        }

        small {
            font-family: monospace;
            opacity: 0.5;
            margin-right: 0.5rem;
        }

        /* LINK */

        a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid currentColor;
        }

        a:hover {
            opacity: 0.7;
        }

        /* FOOTER */

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} giovanniduminuco.it</p>
    </footer>
</body>
</html>
