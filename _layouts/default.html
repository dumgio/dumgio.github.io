<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD | Ricerca Pedagogica e Sociale{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    
    {% seo %}

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.url == "/" %}Giovanni Duminuco, PhD | Ricerca Pedagogica e Sociale{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}">
    <meta property="og:description" content="Ricerca pedagogica, filosofia dell'educazione e progettazione sociale.">
    <meta property="og:image" content="https://giovanniduminuco.it/assets/img/og-default.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://giovanniduminuco.it{{ page.url }}">
    
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root { 
            --bg: #f2f2f2;      
            --fg: #0a0a0a;      
            --accent: #666666;  
            --border: #e5e5e5;  
            --m-width: 680px;
        }
        
        [data-theme="dark"] { 
            --bg: #0a0a0a; 
            --fg: #d0d0d0; 
            --accent: #a0a0a0; 
            --border: #2a2f33; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            /* Font di sistema pulito, uniforme ovunque */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); 
            color: var(--fg); 
            font-size: 16px; /* Base fissa */
            line-height: 1.6;     
            -webkit-font-smoothing: antialiased; 
        }
        
        body { 
            padding: 8vh 1.5rem 4vh; 
            max-width: var(--m-width); 
            margin: 0 auto; 
        }

        /* Testo uniforme: paragrafi, liste e descrizioni hanno la stessa dimensione */
        p, li, .ambito-descrizione, .hero-role { 
            font-size: 1rem; 
            font-weight: 400;
            margin-bottom: 1.2rem;
        }

        /* Titoli sezioni: stessa dimensione del testo, solo leggermente più marcati */
        h2 { 
            font-size: 1rem; 
            font-weight: 600; 
            color: var(--fg);
            margin: 2rem 0 1rem;
            text-transform: none;
            border: none;
        }

        /* Header snello */
        header { 
            margin-bottom: 2.5rem; 
            display: grid; 
            grid-template-columns: 85px 1fr; 
            gap: 1.5rem; 
            align-items: center; 
        }
        
        .profile-photo { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--border); }
        
        h1 { font-size: 1.1rem; font-weight: 600; }
        h1 a { text-decoration: none; color: inherit; }

        .hero-role { color: var(--accent); margin-bottom: 0.2rem; }
        
        .social-links { display: flex; gap: 1rem; }
        .social-links a, main a, .ambito-titolo a { 
            text-decoration: underline; 
            text-underline-offset: 3px;
            color: inherit; 
        }

        /* Classi per pulire la lista Ambiti */
        .ambito-item { margin-bottom: 0.8rem; list-style: none; }
        .ambito-titolo { font-weight: 600; display: inline; }
        .ambito-descrizione { display: inline; }

        /* Pulsante tema minimale */
        #theme-toggle { 
            position: absolute; top: 2rem; right: 1.5rem; 
            background: none; border: 1px solid var(--border); 
            border-radius: 50%; width: 34px; height: 34px; 
            cursor: pointer; color: var(--accent);
            display: flex; align-items: center; justify-content: center;
        }

        footer { 
            margin-top: 4rem; padding-top: 1.5rem; 
            border-top: 1px solid var(--border); 
            font-size: 0.9rem; color: var(--accent); 
        }
        .footer-links { display: flex; gap: 0.8rem; margin-top: 0.5rem; }

        @media (max-width: 450px) {
            header { grid-template-columns: 1fr; text-align: center; }
            .social-links { justify-content: center; }
            #theme-toggle { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Cambia tema">
        <svg id="sun-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        <div>
            <h1><a href="/">Giovanni Duminuco, PhD</a></h1>
            <p class="hero-role">Educazione, soggettività e trasformazione sociale</p>
            <nav class="social-links">
                <a href="/blog">Appunti</a>
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</p>
        <div class="footer-links">
            <a href="/info">Info</a> &middot; 
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a> &middot; 
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </div>
    </footer>

    <script>
        const btn = document.getElementById("theme-toggle");
        const sunIcon = document.getElementById("sun-icon");
        const moonIcon = document.getElementById("moon-icon");
        function updateIcons(theme) {
            const isDark = theme === "dark";
            sunIcon.style.display = isDark ? "block" : "none";
            moonIcon.style.display = isDark ? "none" : "block";
        }
        let currentTheme = document.documentElement.getAttribute("data-theme") || "light";
        updateIcons(currentTheme);
        btn.addEventListener("click", () => {
            let theme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            updateIcons(theme);
        });
    </script>
</body>
</html>
