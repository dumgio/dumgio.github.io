<!DOCTYPE html>
<html lang="{{ site.lang | default: 'it' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
    {% seo %}
    <link rel="icon" type="image/jpeg" href="{{ '/profile.jpg' | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300..700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Giovanni Duminuco",
      "jobTitle": [
        "Consultant",
        "Project Manager",
        "Researcher"
      ],
      "honorificSuffix": "PhD",
      "url": "{{ site.url }}",
      "image": "{{ '/profile.jpg' | absolute_url }}",
      "sameAs": [
        "https://www.linkedin.com/in/dumgio/",
        "https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it"
      ],
      "description": "Dottore di ricerca in scienze dell’educazione, progettista e docente. Esperto in innovazione sociale, europrogettazione e valutazione dell'impatto sociale.",
      "knowsAbout": [
        "Educational Sciences",
        "Social Pedagogy",
        "Philosophy of Education",
        "Project Management",
        "Data Analysis",
        "Social Impact Assessment"
      ]
    }
    </script>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>
              <a href="{{ '/' | relative_url }}">
                {{ site.author | replace: ' ', '' }} <span class="title-phd">PhD</span><span class="cursor">_</span>
              </a>
            </h1>
            <button id="theme-toggle" aria-label="Cambia tema" aria-pressed="false">◐</button>
        </div>
    </header>

    <script>
      const toggle = document.getElementById('theme-toggle');
      const body = document.body;
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'dark' || (!saved && prefersDark)) {
        body.classList.add('dark-theme');
        toggle.setAttribute('aria-pressed', 'true');
      } else if (saved === 'light') {
        body.classList.add('light-theme');
      }

      toggle.addEventListener('click', () => {
        const goingDark = !body.classList.contains('dark-theme');
        body.classList.remove('dark-theme', 'light-theme');
        body.classList.add(goingDark ? 'dark-theme' : 'light-theme');
        localStorage.setItem('theme', goingDark ? 'dark' : 'light');
        toggle.setAttribute('aria-pressed', goingDark ? 'true' : 'false');
      });
    </script>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.author }}</p>
        <nav>
            <a href="{{ '/info/' | relative_url }}">Info</a>
            <a href="{{ '/now/' | relative_url }}">Now</a>
            <a href="mailto:{{ site.email | default: 'mail@giod.it' }}">Email</a>
            <a href="https://www.linkedin.com/in/dumgio/">LinkedIn</a>
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it">Scholar</a>
            <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </nav>
    </footer>

    <script src="//instant.page/5.2.0" type="module" integrity="sha384-jnZyxPjiipS0NFM9FA32iIhmxIP5WlrQp457D2u9Lzme3/mSYkXG9K5Qms9vuuXE"></script>

</body>
</html>
