<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    {% seo %}
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --link: #0000ee;
            --stack-gap: 2rem;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --link: #58a6ff;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            padding: 2rem;
            max-width: 650px;
            margin: 0 auto;
        }

        .stack > * + * { margin-top: var(--stack-gap); }

        h1.logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        h1.logo span { font-weight: 400; opacity: 0.6; }

        h2 { font-size: 1.2rem; font-weight: 700; margin-top: 3rem; margin-bottom: 1rem; border-bottom: 1px solid currentColor; padding-bottom: 0.5rem; }

        p { margin-bottom: 1rem; }
        em { font-style: italic; }
        strong { font-weight: 700; }

        ul { list-style: none; }
        li { margin-bottom: 0.5rem; display: flex; gap: 1rem; align-items: baseline; }
        small { font-family: monospace; opacity: 0.6; min-width: 85px; }

        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }

        footer { margin-top: 5rem; padding-top: 2rem; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>
    <main class="stack">
        {{ content }}
    </main>
    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} giovanniduminuco.it</p>
    </footer>
</body>
</html>
