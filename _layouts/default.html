<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f2f2f2; 
            --text-color: #111;
            --color-primary: #1a0dab; 
            --max-width: 700px;
            --border-light: #96909061;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f1417;
                --text-color: #d0d0d0;
                --color-primary: wheat; 
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { background-color: var(--bg-color); }

        body {
            max-width: var(--max-width);
            margin: 0 auto; 
            padding: 4rem 1.5rem; 
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Bespoke Serif', Georgia, serif !important;
            font-size: 17px; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center; 
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .profile-photo {
            width: 65px; height: 65px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1.5rem;
            border: 1px solid var(--border-light);
        }

        .title h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        header a { text-decoration: none; color: inherit; }
        nav { margin-top: 0.2rem; font-size: 17px; }
        nav a { margin-right: 1rem; text-decoration: none; color: inherit; }

        main { margin-bottom: 4rem; }

        a {
            color: currentColor;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }

        /* AZZERAMENTO MOVIMENTO AMBITI */
        h2 {
            font-size: 1.3rem;
            margin: 2.5rem 0 1.5rem; /* Margine sotto il titolo di sezione */
            font-weight: 600;
        }

        .ambito-item {
            margin-bottom: 0.5rem; /* Spazio ridotto tra i vari ambiti */
            line-height: 1.5;
        }

        .ambito-titolo {
            font-weight: 600; /* Grassetto visibile ma integrato */
            display: inline;
        }

        .ambito-descrizione {
            font-weight: 400;
            display: inline;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 2.5rem 0;
        }

        footer {
            margin-top: 5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }

        footer a { text-decoration: none; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        <div class="title-group">
            <a class="title" href="/">
                <h1>Giovanni Duminuco, PhD</h1>
            </a>
            <nav>
                <a href="/blog">Appunti</a> 
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
        <nav>
            <a href="/info">Info</a> &middot; 
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a> &middot; 
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </nav>
    </footer>

</body>
</html>
