<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Giovanni Duminuco, PhD</title>
    <meta name="description" content="Giovanni Duminuco, PhD. Ricerca pedagogica applicata al sociale e progettazione nel Terzo Settore.">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.documentElement.setAttribute("data-theme", savedTheme);
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        :root { --bg: #ffffff; --fg: #111111; --accent: #666666; --border: #e8e8e8; --m-width: 650px; }
        [data-theme="dark"] { --bg: #0a0a0a; --fg: #e0e0e0; --accent: #888888; --border: #1e1e1e; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--fg); line-height: 1.5; 
            -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease; 
        }
        
        body { 
            padding: 8vh 1.5rem 4vh; 
            max-width: var(--m-width); 
            margin: 0 auto; 
            position: relative; 
            text-align: left; 
        }
        
        #theme-toggle { 
            position: absolute; 
            top: 2rem; 
            right: 1.5rem; 
            background: none; 
            border: 1px solid var(--border); 
            border-radius: 50%; 
            width: 38px; 
            height: 38px; 
            cursor: pointer; 
            color: var(--accent); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease; 
            padding: 0; 
        }
        
        #theme-toggle:hover { border-color: var(--accent); color: var(--fg); }
        [data-theme="dark"] #sun-icon { color: #ffb700; filter: drop-shadow(0 0 2px rgba(255, 183, 0, 0.4)); }
        
        header { 
            margin-bottom: 2.5rem; 
            display: grid; 
            grid-template-columns: 85px 1fr; 
            gap: 1.5rem; 
            align-items: center; 
            text-align: left;
        }
        .profile-photo { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        
        h1 { font-size: 1.45rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.2rem; }
        h1 a { text-decoration: none; color: inherit; }
        h1 a:hover { color: var(--accent); }

        .hero-role { font-size: 0.85rem; color: var(--accent); margin-bottom: 0.8rem; }
        
        .social-links { display: flex; gap: 1rem; margin-top: 0.5rem; }
        .social-links a { text-decoration: none; color: var(--accent); font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
        .social-links a:hover { color: var(--fg); }
        
        section { margin-bottom: 3rem; }
        h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        
        .text-block { font-size: 1rem; line-height: 1.6; }
        .list-grid { display: grid; gap: 1.2rem; }
        .item { padding-left: 1rem; border-left: 2px solid var(--border); transition: border-color 0.2s; }
        .item:hover { border-left-color: var(--accent); }
        .item strong { display: block; font-size: 0.95rem; color: var(--fg); margin-bottom: 0.2rem; }
        .item span { font-size: 0.9rem; color: var(--accent); }
        
        footer { 
            margin-top: 4rem; 
            padding-top: 1.5rem; 
            border-top: 1px solid var(--border); 
            font-size: 0.85rem; 
            color: var(--accent); 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 1rem; 
        }
        .footer-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
        footer a:hover { color: var(--fg); }

        /* Media Query aggiornata per mantenere l'allineamento a sinistra su mobile */
        @media (max-width: 600px) {
            header { 
                grid-template-columns: 85px 1fr; /* Mantiene la foto a sinistra del testo */
                text-align: left; 
                justify-items: start; 
            }
            #theme-toggle { right: 1rem; }
            
            /* Se lo schermo è piccolissimo, puoi scegliere se impilare ma sempre a sinistra */
            @media (max-width: 400px) {
                header { grid-template-columns: 1fr; gap: 1rem; }
            }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Cambia tema">
        <svg id="sun-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        <div>
            <h1><a href="/">Giovanni Duminuco, PhD</a></h1>
            <p class="hero-role">Ricerca pedagogica applicata al sociale</p>
            <nav class="social-links">
                <a href="/blog">Appunti</a>
                <a href="mailto:giovanni.duminuco@gmail.com">Email</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</p>
        <div class="footer-links">
            <a href="/info">Info</a> &middot; 
            <a href="mailto:giovanni.duminuco@gmail.com">Email</a> &middot; 
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank" rel="noopener">LinkedIn</a> &middot; 
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank" rel="noopener">Scholar</a>
        </div>
    </footer>

    <script>
        const btn = document.getElementById("theme-toggle");
        const sunIcon = document.getElementById("sun-icon");
        const moonIcon = document.getElementById("moon-icon");

        function updateIcons(theme) {
            const isDark = theme === "dark";
            sunIcon.style.display = isDark ? "block" : "none";
            moonIcon.style.display = isDark ? "none" : "block";
        }

        let currentTheme = document.documentElement.getAttribute("data-theme") || "light";
        updateIcons(currentTheme);

        btn.addEventListener("click", () => {
            let theme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            updateIcons(theme);
        });
    </script>
</body>
</html>
