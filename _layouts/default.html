<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else if (savedTheme === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f2f2f2; 
            --text-color: #111;
            --border-light: #96909061;
            --spacing: 1.5rem;
            --max-width: 850px;
        }

        [data-theme="dark"] {
            --bg-color: #0f1417;
            --text-color: #d0d0d0;
            --border-light: #2a2f33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: var(--bg-color); color: var(--text-color); }

        body {
            max-width: var(--max-width);
            margin: 0 auto; 
            padding: 2rem;
            font-family: 'Bespoke Serif', Georgia, serif !important;
            font-size: 1.15rem; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            border-bottom: 1px solid var(--border-light);
            padding: 1.5rem 0;
            margin-bottom: 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text-color);
        }

        nav { display: flex; gap: 1.5rem; }
        nav a { font-size: 0.95rem; text-decoration: none; color: var(--text-color); text-transform: lowercase; }

        #theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 0;
            display: flex;
            opacity: 0.6;
        }

        #sun-icon, #moon-icon { display: none; width: 18px; height: 18px; }
        [data-theme="dark"] #sun-icon { display: block; }
        html:not([data-theme="dark"]) #moon-icon { display: block; }

        main { margin-bottom: 4rem; }

        .home-hero {
            display: flex;
            gap: 4rem;
            align-items: flex-start;
            margin-bottom: 5rem;
        }

        .hero-text { flex: 1.5; }
        .hero-image { flex: 1; text-align: right; }
        
        .hero-image img {
            width: 100%;
            max-width: 280px;
            border-radius: 2px;
            filter: grayscale(100%);
        }

        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 1.5rem; line-height: 1.2; }
        h2 { font-size: 1.3rem; margin: 3rem 0 1.5rem; font-weight: 600; }
        p { margin-bottom: 1.5rem; }

        a { color: var(--text-color); text-decoration: none; }
        a:hover {
            text-decoration: underline;
            text-decoration-thickness: 0.1ex;
            text-underline-offset: 0.3ex;
        }

        hr { border: none; border-top: 1px solid var(--border-light); margin: 3rem 0; }

        .ambito-item { margin-bottom: 1rem; }
        .ambito-titolo { font-weight: 600; }

        footer {
            margin-top: 6rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border-light);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            text-transform: lowercase;
        }

        @media screen and (max-width: 768px) {
            .home-hero { flex-direction: column-reverse; gap: 2rem; }
            .hero-image { text-align: left; }
            .hero-image img { max-width: 150px; }
            h1 { font-size: 1.8rem; }
            footer { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="header-logo">GD.</a>
        <nav>
            <a href="/blog">Appunti</a> 
            <a href="/info">Info</a>
            <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            <button id="theme-toggle" aria-label="Cambia tema">
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
        <div style="display: flex; gap: 1.5rem;">
            <a href="/info">Info</a>
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a>
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        });
    </script>
</body>
</html>
