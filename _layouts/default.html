<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
    
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD | Ricerca Pedagogica e Sociale{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    
    {% seo %}

    <style>
        /* Importazione Font Serif di Dave Lee */
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
            font-style: normal;
        }

        :root {
            --bg-color: #FFFFFF;
            --text-color: #111;
            --color-primary: #1a0dab; 
            --spacing: 1rem;
            --max-width: 700px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #222;
                --text-color: #fff;
                --color-primary: wheat; 
            }
        }

        * { box-sizing: border-box; }

        body {
            max-width: var(--m-width);
            margin: 0 auto;
            padding: var(--spacing);
            background: var(--bg-color);
            color: var(--text-color);
            /* Qui usiamo il font Serif per TUTTO il corpo, inclusi titolo e nav */
            font-family: 'Bespoke Serif', Georgia, serif !important;
            font-size: 1.165rem; 
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        @media screen and (max-width: 620px) {
            body {
                font-size: 1.125rem !important;
                line-height: 1.55 !important;
            }
        }

        header {
            border-bottom: 1px solid #96909061;
            display: flex;
            align-items: center; 
            padding: 1rem 0;
        }

        .profile-photo {
            width: 55px; 
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1.5rem;
            border: 1px solid #96909061;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        /* Titolo con lo stesso font del blog di Dave Lee */
        .title h1 {
            font-size: 1.3rem; 
            margin: 0;
            font-weight: 600;
            font-family: 'Bespoke Serif', Georgia, serif !important;
        }

        header a { text-decoration: none; color: inherit; }

        nav {
            margin-top: 0.1rem;
            font-size: 1rem;
        }

        nav a {
            margin-right: var(--spacing);
            text-decoration: none;
            color: inherit;
            font-family: 'Bespoke Serif', Georgia, serif !important;
        }

        main {
            margin: 2rem 0 3rem 0;
        }

        a {
            color: currentColor;
            text-decoration-color: currentColor;
            text-decoration-thickness: 0.1ex;
            text-underline-offset: 0.3ex;
        }

        a:hover {
            color: var(--color-primary);
            text-decoration-color: var(--color-primary);
            text-decoration: underline;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.25;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        footer {
            margin-top: 4rem;
            padding: 2rem 0;
            font-size: 1rem;
            border-top: 1px solid #96909061;
            text-transform: lowercase;
        }

        footer a { text-decoration: none; color: inherit; }
    </style>
</head>
<body class="home">

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        
        <div class="title-group">
            <a class="title" href="/">
                <h1>Giovanni Duminuco, PhD</h1>
            </a>
            
            <nav>
                <a href="/blog">Blog</a> 
                <a href="/info">Bio</a> 
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
        <span style="float: right;">
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a> &middot; 
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </span>
    </footer>

</body>
</html>
