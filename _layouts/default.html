<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    
    {% seo %}

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}">
    <meta property="og:description" content="Ricerca pedagogica, filosofia dell'educazione e progettazione sociale.">
    <meta property="og:image" content="https://giovanniduminuco.it/assets/img/og-default.png">
    <meta property="og:url" content="https://giovanniduminuco.it{{ page.url }}">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --width: 680px;
            --font-main: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --font-scale: 17px;
            
            /* Light mode (Olle Palette) */
            --background-color: #f2f2f2;
            --heading-color: #111111;
            --text-color: #0A0A0A;
            --link-color: #111111;
            --visited-color: #666666;
            --border-color: #e5e5e5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #0f1417;
                --heading-color: #f2f2f2;
                --text-color: #d0d0d0;
                --link-color: #f2f2f2;
                --visited-color: #a0a0a0;
                --border-color: #2a2f33;
            }
        }

        html {
            font-family: var(--font-main);
            background-color: var(--background-color);
            color: var(--text-color);
        }

        body {
            margin: 3.5rem auto;
            padding: 0 1.25rem;
            max-width: var(--width);
            font-size: var(--font-scale);
            line-height: 1.7;
            word-wrap: break-word;
        }

        /* Header e Titolo */
        header { margin-bottom: 2rem; }
        .title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0;
            color: var(--heading-color);
        }
        
        header a { text-decoration: none; color: inherit; }

        /* Headings uniformi */
        h1, h2, h3 {
            color: var(--heading-color);
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-top: 2.5rem;
            font-size: 1.2rem; /* Uniformità dimensionale stile Olle */
        }

        p { margin: 1.25rem 0; }

        /* Link: Sottolineatura fissa, NO HOOVER */
        a {
            color: var(--link-color);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }
        
        /* Navigazione orizzontale */
        nav a { margin-right: 0.75rem; text-decoration: underline; }

        /* Liste (Ambiti e Post) */
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 0.6rem; }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 3rem 0;
        }

        footer {
            margin-top: 4rem;
            padding: 2rem 0;
            font-size: 0.9rem;
            color: var(--visited-color);
        }

        /* Foto profilo opzionale (se vuoi tenerla) */
        .profile-photo {
            width: 60px; height: 60px;
            border-radius: 50%;
            margin-bottom: 1rem;
            display: block;
        }

        /* Per gli ultimi post stile blog */
        .post-date {
            color: var(--visited-color);
            font-size: 0.9rem;
            margin-right: 1rem;
        }
    </style>
</head>
<body class="home">

    <header>
        <a class="title" href="/">
            <h1>Giovanni Duminuco</h1>
        </a>
        <nav style="margin-top: 0.5rem;">
            <a href="/blog">Appunti</a>
            <a href="/info">Info</a>
            <a href="mailto:giovanni.duminuco@gmail.com">Email</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <hr>
        <p>Giovanni Duminuco, PhD · <a href="https://www.linkedin.com/in/dumgio/">LinkedIn</a> · <a href="/feed.xml">RSS</a></p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem;">Educazione, soggettività e trasformazione sociale.</p>
    </footer>

</body>
</html>
