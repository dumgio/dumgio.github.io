<!DOCTYPE html>
<html lang="{{ site.lang | default: 'it' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
    {% seo %}
    <link rel="icon" type="image/jpeg" href="{{ '/profile.jpg' | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <header style="display: flex; align-items: baseline; justify-content: space-between; max-width: var(--measure);">
        <h1>
          <a href="{{ '/' | relative_url }}">
            {{ site.author | replace: ' ', '' }} <span class="title-phd">PhD</span><span class="cursor">_</span>
          </a>
        </h1>
        <button id="theme-toggle" title="Cambia atmosfera">◐</button>
    </header>

    <script>
      const toggle = document.getElementById('theme-toggle');
      const body = document.body;
      
      if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-theme');
      }

      toggle.addEventListener('click', () => {
        body.classList.toggle('dark-theme');
        const isDark = body.classList.contains('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });
    </script>

    <style>
      body.dark-theme {
        --bg-color: hsl(0deg, 0%, 8%);
        --text-color: hsl(0deg, 0%, 80%);
        --highlight-bg-color: hsl(0deg, 0%, 85%);
        --highlight-text-color: hsl(0deg, 0%, 0%);
        --copyright-color: hsl(0deg, 0%, 60%);
      }
    </style>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.author }}</p>
        <nav>
            <a href="{{ '/info/' | relative_url }}">Info</a>
            <a href="mailto:{{ site.email | default: 'mail@giod.it' }}">Email</a>
            <a href="https://www.linkedin.com/in/dumgio/">LinkedIn</a>
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it">Scholar</a>
            <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </nav>
    </footer>

    <script src="//instant.page/5.2.0" type="module" integrity="sha384-jnZyxPjiipS0NFM9FA32iIhmxIP5WlrQp457D2u9Lzme3/mSYkXG9K5Qms9vuuXE"></script>

</body>
</html>
