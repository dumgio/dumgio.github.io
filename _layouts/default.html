    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.documentElement.setAttribute("data-theme", savedTheme);
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        :root { --bg: #ffffff; --fg: #111111; --accent: #666666; --border: #e8e8e8; --m-width: 600px; }
        [data-theme="dark"] { --bg: #0a0a0a; --fg: #e0e0e0; --accent: #888888; --border: #1e1e1e; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            /* Font di sistema: velocità pura */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); 
            color: var(--fg); 
            line-height: 1.5; 
            -webkit-font-smoothing: antialiased; 
            transition: background-color 0.3s ease; 
        }
        
        body { padding: 8vh 1.5rem 4vh; max-width: var(--m-width); margin: 0 auto; position: relative; }
        
        #theme-toggle { position: absolute; top: 2rem; right: 1.5rem; background: none; border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; color: var(--accent); display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        
        header { margin-bottom: 2.5rem; display: grid; grid-template-columns: 85px 1fr; gap: 1.5rem; align-items: center; }

        .social-links { display: flex; gap: 1rem; margin-top: 0.5rem; }

        .social-links a:hover { color: var(--fg); }
        
        section { margin-bottom: 3rem; }
        h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        
        .text-block { font-size: 1rem; line-height: 1.6; }

        .item span { font-size: 0.9rem; color: var(--accent); }
        
        footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--accent); display: flex; justify-content: space-between; }
        
        @media (max-width: 600px) {
            header { grid-template-columns: 1fr; text-align: center; justify-items: center; }
        }
    </style>
