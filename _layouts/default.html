<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") document.documentElement.setAttribute("data-theme", "dark");
            else if (savedTheme === "light") document.documentElement.setAttribute("data-theme", "light");
            else if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.setAttribute("data-theme", "dark");
        })();
    </script>

    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800; font-display: swap;
        }

        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --accent: #0066cc;
            --border: #e5e5e5;
            --secondary: #666666;
            --header-bg: rgba(255, 255, 255, 0.8);
            --max-width: 680px;
        }

        [data-theme="dark"] {
            --bg: #0a0c10;
            --fg: #eeeeee;
            --accent: #4da6ff;
            --border: #222;
            --secondary: #999;
            --header-bg: rgba(10, 12, 16, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s ease; }
        
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Bespoke Serif', Georgia, serif;
            font-size: 1.1rem;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            padding: 0 1.5rem;
        }

        /* Header Moderno con Blur */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            margin: 0 -1.5rem 3rem -1.5rem;
            padding: 1.5rem;
        }

        .header-container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-photo {
            width: 56px; height: 56px;
            border-radius: 16px; /* Bordi leggermente arrotondati invece che tondi */
            object-fit: cover;
            filter: grayscale(20%);
            border: 1px solid var(--border);
        }

        .header-content { flex-grow: 1; }
        
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
        .phd-text { font-weight: 400; opacity: 0.6; font-size: 0.85rem; }

        nav { display: flex; gap: 1.2rem; margin-top: 0.4rem; }
        nav a { 
            font-size: 0.95rem; 
            color: var(--secondary); 
            text-decoration: none;
            position: relative;
        }
        
        nav a:hover { color: var(--fg); }
        nav a::after {
            content: '';
            position: absolute; width: 0; height: 1px;
            bottom: -2px; left: 0; background-color: var(--accent);
            transition: width 0.3s ease;
        }
        nav a:hover::after { width: 100%; }

        /* Contenuto */
        main { max-width: var(--max-width); margin: 0 auto; }
        
        h2 { 
            font-size: 1.5rem; 
            margin: 3.5rem 0 1.5rem; 
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        p { margin-bottom: 1.5rem; color: var(--fg); opacity: 0.9; }

        /* Liste e Bio */
        .post-list { margin-top: 2rem; }
        .post-item { 
            display: flex; 
            gap: 2rem; 
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 12px;
            margin-left: -1rem; /* Per allineare il testo */
            transition: background 0.2s ease;
        }
        .post-item:hover { background: rgba(128,128,128,0.05); }
        .date { font-family: monospace; font-size: 0.9rem; opacity: 0.5; min-width: 85px; }

        /* Tema Toggle */
        #theme-toggle {
            background: none; border: none; color: var(--fg);
            cursor: pointer; opacity: 0.5; padding: 5px;
        }
        #theme-toggle:hover { opacity: 1; transform: rotate(15deg); }

        /* Footer */
        footer {
            max-width: var(--max-width);
            margin: 6rem auto 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--secondary);
        }

        .footer-container { display: flex; justify-content: space-between; }

        @media (max-width: 600px) {
            .header-container { gap: 1rem; }
            .profile-photo { width: 45px; height: 45px; }
            .post-item { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
            <div class="header-content">
                <div class="title-row">
                    <a href="/" style="text-decoration: none; color: inherit;">
                        <h1>Giovanni Duminuco <span class="phd-text">Ph.D.</span></h1>
                    </a>
                    <button id="theme-toggle" aria-label="Cambia tema">
                        <svg id="sun-icon" style="display:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg id="moon-icon" style="display:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
                <nav>
                    <a href="/blog">Appunti</a>
                    <a href="/info">Bio</a>
                    <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-container">
            <span>© {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
            <div style="display:flex; gap: 15px;">
                <a href="https://linkedin.com/in/dumgio" target="_blank">LinkedIn</a>
                <a href="https://scholar.google.it" target="_blank">Scholar</a>
            </div>
        </div>
    </footer>

    <script>
        const btn = document.getElementById('theme-toggle');
        const sun = document.getElementById('sun-icon');
        const moon = document.getElementById('moon-icon');
        
        function updateIcons() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            sun.style.display = isDark ? 'block' : 'none';
            moon.style.display = isDark ? 'none' : 'block';
        }
        
        updateIcons();
        btn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateIcons();
        });
    </script>
</body>
</html>
