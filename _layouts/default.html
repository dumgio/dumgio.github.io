<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else if (savedTheme === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        /* Font Shikun Style */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap');

        :root {
            --bg-color: #f6f6f6; 
            --text-color: #1a1a1a;
            --border-color: rgba(0,0,0,0.08);
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-serif: 'Newsreader', serif;
            --max-width: 900px;
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --text-color: #e0e0e0;
            --border-color: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s ease; }

        body {
            max-width: var(--max-width);
            margin: 0 auto; 
            padding: 0 2rem;
            font-family: var(--font-serif);
            font-size: 1.15rem; 
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Desktop con Pallino */
        header {
            padding: 3rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-decoration: none;
            color: var(--text-color);
        }

        .nav-desktop {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .nav-desktop a { text-decoration: none; color: var(--text-color); opacity: 0.6; transition: opacity 0.2s; }
        .nav-desktop a:hover { opacity: 1; }
        .nav-dot { width: 4px; height: 4px; background: var(--text-color); border-radius: 50%; opacity: 0.2; }

        /* Mobile Menu (Hamburger) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 1001;
        }
        .menu-toggle span { width: 22px; height: 1.5px; background: var(--text-color); transition: 0.3s; }

        .nav-mobile {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-mobile.active { right: 0; }
        .nav-mobile a { font-family: var(--font-sans); font-size: 1.5rem; text-decoration: none; color: var(--text-color); }

        /* Layout Hero */
        .home-hero {
            display: flex;
            gap: 4rem;
            align-items: flex-start;
            padding: 4rem 0;
        }
        .hero-text { flex: 1.5; }
        .hero-image { flex: 1; text-align: right; }
        .hero-image img { width: 100%; max-width: 300px; filter: grayscale(100%); }

        h1 { font-family: var(--font-sans); font-size: 2.8rem; font-weight: 400; margin-bottom: 2rem; }
        h2 { font-family: var(--font-sans); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.2em; margin: 4rem 0 2rem; opacity: 0.5; }

        hr { border: none; border-top: 1px solid var(--border-color); margin: 4rem 0; }

        /* Links */
        a { color: inherit; transition: opacity 0.2s; }
        .post-list a { text-decoration: none; }
        .post-list a:hover { text-decoration: underline; text-underline-offset: 4px; }

        footer {
            padding: 5rem 0 3rem;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            opacity: 0.5;
        }

        @media screen and (max-width: 768px) {
            .nav-desktop { display: none; }
            .menu-toggle { display: flex; }
            .home-hero { flex-direction: column-reverse; gap: 2rem; padding: 2rem 0; }
            h1 { font-size: 2rem; }
            body { padding: 0 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="header-logo">G. DUMINUCO</a>
        
        <div class="nav-desktop">
            <a href="/blog">Appunti</a>
            <div class="nav-dot"></div>
            <a href="/info">Info</a>
            <div class="nav-dot"></div>
            <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            <div class="nav-dot"></div>
            <button id="theme-toggle" style="cursor:pointer; background:none; border:none; color:inherit; font:inherit; text-transform:inherit; letter-spacing:inherit; opacity:0.6;">Tema</button>
        </div>

        <button class="menu-toggle" id="mobile-btn">
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="nav-mobile" id="mobile-menu">
        <a href="/blog">Appunti</a>
        <a href="/info">Info</a>
        <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }}</span>
        <div style="display: flex; gap: 2rem;">
            <a href="https://www.linkedin.com/in/dumgio/">Linkedin</a>
            <a href="https://scholar.google.com/">Scholar</a>
        </div>
    </footer>

    <script>
        // Tema
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        });

        // Mobile Menu
        const mobileBtn = document.getElementById('mobile-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            mobileBtn.classList.toggle('open');
        });
    </script>
</body>
</html>
