<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <script>
        // Script per gestire il tema prima del rendering della pagina
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else if (savedTheme === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f2f2f2; 
            --text-color: #111;
            --border-light: #96909061;
            --max-width: 700px;
        }

        /* Dark Mode gestita tramite attributo per il toggle manuale */
        [data-theme="dark"] {
            --bg-color: #0f1417;
            --text-color: #d0d0d0;
            --border-light: #2a2f33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { background-color: var(--bg-color); transition: background-color 0.3s ease; }

        body {
            max-width: var(--max-width);
            margin: 0 auto; 
            padding: 4rem 1.5rem; 
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Bespoke Serif', Georgia, serif !important;
            font-size: 17px; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Pulsante Dark Mode minimale in alto a destra */
        #theme-toggle {
            position: absolute;
            top: 2rem;
            right: 1.5rem;
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text-color);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 0.8rem;
            font-family: inherit;
            border-radius: 4px;
            opacity: 0.6;
        }
        #theme-toggle:hover { opacity: 1; }

        header {
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center; 
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .profile-photo {
            width: 65px; height: 65px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1.5rem;
            border: 1px solid var(--border-light);
        }

        .title h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
        
        /* LOGICA LINK DAVE LEE: Niente sottolineatura di base, compare in hover */
        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--text-color);
            text-decoration: underline;
            text-decoration-thickness: 0.1ex;
            text-underline-offset: 0.3ex;
        }

        nav { margin-top: 0.2rem; font-size: 17px; }
        nav a { margin-right: 1rem; }

        main { margin-bottom: 4rem; }

        h2 {
            font-size: 1.3rem;
            margin: 2.5rem 0 1.5rem;
            font-weight: 600;
        }

        .ambito-item {
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .ambito-titolo {
            font-weight: 600;
            display: inline;
        }

        .ambito-descrizione {
            font-weight: 400;
            display: inline;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 2.5rem 0;
        }

        footer {
            margin-top: 5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }

        footer a { opacity: 0.8; }
        footer a:hover { opacity: 1; }

        @media screen and (max-width: 600px) {
            body { padding: 2rem 1.2rem; }
            #theme-toggle { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Cambia tema">Tema</button>

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        <div class="title-group">
            <a class="title" href="/">
                <h1>Giovanni Duminuco, PhD</h1>
            </a>
            <nav>
                <a href="/blog">Appunti</a> 
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
        <nav>
            <a href="/info">Info</a> &middot; 
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a> &middot; 
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </nav>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        // Funzione per aggiornare l'etichetta del tasto
        function updateButtonLabel(theme) {
            toggleBtn.textContent = theme === 'dark' ? 'Chiaro' : 'Scuro';
        }

        // Inizializzazione etichetta
        updateButtonLabel(document.documentElement.getAttribute('data-theme') || 'light');

        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            updateButtonLabel(nextTheme);
        });
    </script>
</body>
</html>
