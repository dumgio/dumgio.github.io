<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else if (savedTheme === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>

    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f2f2f2; 
            --text-color: #111;
            --border-light: #96909061;
            --max-width: 700px;
        }

        [data-theme="dark"] {
            --bg-color: #0f1417;
            --text-color: #d0d0d0;
            --border-light: #2a2f33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background-color: var(--bg-color); color: var(--text-color); }

        body {
            max-width: var(--max-width);
            margin: 0 auto; 
            padding: 4rem 1.5rem; 
            font-family: 'Bespoke Serif', Georgia, serif !important;
            font-size: 17px; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Posizionamento Tema Migliorato */
        #theme-toggle {
            position: absolute;
            top: 2rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 5px;
            opacity: 0.6;
            display: flex;
            z-index: 10;
        }
        
        #sun-icon, #moon-icon { display: none; width: 20px; height: 20px; }
        [data-theme="dark"] #sun-icon { display: block; }
        html:not([data-theme="dark"]) #moon-icon { display: block; }

        header {
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center; 
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .profile-photo {
            width: 65px; height: 65px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1.5rem;
            border: 1px solid var(--border-light);
        }

        .title h1 { font-size: 1.25rem; font-weight: 600; margin: 0; line-height: 1.2; }
        
        a { color: inherit; text-decoration: none; }
        a:hover {
            text-decoration: underline;
            text-decoration-thickness: 0.1ex;
            text-underline-offset: 0.3ex;
        }

        nav { margin-top: 0.2rem; font-size: 17px; }
        nav a { margin-right: 1rem; }

        main { margin-bottom: 4rem; }

        footer {
            margin-top: 5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-nav { display: flex; gap: 12px; }
        footer a { opacity: 0.8; }

        /* Mobile Adjustments */
        @media screen and (max-width: 600px) {
            body { padding: 5rem 1.2rem 2rem; }
            #theme-toggle { top: 1.5rem; right: 1.2rem; }
            header { flex-direction: row; }
            .title h1 { font-size: 1.15rem; max-width: 200px; } /* Evita collisione con icona */
            
            footer { 
                flex-direction: column; 
                gap: 1.5rem; 
                text-align: center; 
            }
            .footer-nav { 
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Cambia tema">
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">
        <div class="title-group">
            <a class="title" href="/">
                <h1>Giovanni Duminuco, PhD</h1>
            </a>
            <nav>
                <a href="/blog">Appunti</a> 
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>
        <div class="footer-nav">
            <a href="/info">Info</a>
            <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a>
            <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        });
    </script>
</body>
</html>
