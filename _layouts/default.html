<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>
    {% seo %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") document.documentElement.setAttribute("data-theme", "dark");
            else if (savedTheme === "light") document.documentElement.setAttribute("data-theme", "light");
            else if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.setAttribute("data-theme", "dark");
        })();
    </script>

    <style>
        :root {
            --bg: #f8f7f4; /* Beige chiaro richiesto */
            --fg: #121212; /* Quasi nero */
            --border: #e8e7e2; /* Separatore sottile */
            --secondary: #8c8c88; /* Grigio morbido */
            --mono: 'DM Mono', monospace;
            --sans: 'Inter', sans-serif;
            --max-width: 650px;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --fg: #f8f7f4;
            --border: #242422;
            --secondary: #757572;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--sans);
            font-size: 1rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 0 1.5rem;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header compatto con Avatar iniziali */
        header {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: inherit;
        }

        .avatar-initials {
            width: 32px;
            height: 32px;
            background-color: var(--fg);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 4px;
        }

        .header-name {
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        nav { display: flex; gap: 1.25rem; }
        nav a { 
            font-size: 0.9rem; 
            color: var(--secondary); 
            text-decoration: none;
            font-weight: 400;
        }
        nav a:hover { color: var(--fg); }

        /* Main & Hero */
        main { max-width: var(--max-width); margin: 4rem auto; }

        .hero { margin-bottom: 5rem; }
        .hero h1 { 
            font-size: 3rem; 
            font-weight: 600; 
            letter-spacing: -0.04em; 
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        .hero h1 span { font-weight: 300; color: var(--fg); } /* Cognome leggero richiesto */
        
        .hero p {
            font-size: 1.2rem;
            color: var(--secondary);
            font-weight: 400;
            max-width: 90%;
        }

        h2 { 
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Post List: Semplicità della riga */
        .post-list { list-style: none; }
        .post-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s;
        }
        .post-item:hover { opacity: 0.7; }

        .post-left { display: flex; align-items: center; gap: 1.5rem; }
        .post-date { 
            font-family: var(--mono); 
            font-size: 0.85rem; 
            color: var(--secondary); 
            min-width: 90px;
        }
        .post-title { 
            font-weight: 400; 
            font-size: 1rem; 
            letter-spacing: -0.01em;
        }
        .post-arrow { font-size: 0.9rem; color: var(--secondary); }

        /* Toggle Tema */
        #theme-toggle {
            background: none; border: none; color: var(--secondary);
            cursor: pointer; padding: 4px; display: flex;
        }
        #theme-toggle:hover { color: var(--fg); }

        /* Footer */
        footer {
            max-width: var(--max-width);
            margin: 8rem auto 4rem;
            font-size: 0.85rem;
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-links { display: flex; gap: 1.5rem; }
        .footer-links a { color: inherit; text-decoration: none; }
        .footer-links a:hover { color: var(--fg); text-decoration: underline; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.25rem; }
            .post-date { min-width: 70px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="header-left">
            <div class="avatar-initials">GD</div>
            <span class="header-name">G. Duminuco</span>
        </a>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <nav>
                <a href="/blog">Appunti</a>
                <a href="/info">Bio</a>
            </nav>
            <button id="theme-toggle" aria-label="Cambia tema">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <span>© {{ "now" | date: "%Y" }}</span>
        <div class="footer-links">
            <a href="https://linkedin.com/in/dumgio" target="_blank">LinkedIn</a>
            <a href="https://scholar.google.it" target="_blank">Scholar</a>
            <a href="mailto:giovanni.duminuco@gmail.com">Email</a>
        </div>
    </footer>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });
    </script>
</body>
</html>
