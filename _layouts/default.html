```html
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% if page.url == "/" %}Giovanni Duminuco, PhD{% else %}{{ page.title }} | Giovanni Duminuco, PhD{% endif %}</title>

    {% seo %}

    <!-- Preload font -->
    <link rel="preload" href="https://static.mighil.com/fonts/BespokeSerif-Variable.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Font principale -->
    <style>
        @font-face {
            font-family: 'Bespoke Serif';
            src: url('https://static.mighil.com/fonts/BespokeSerif-Variable.woff2') format('woff2');
            font-weight: 300 800;
            font-display: swap;
        }
    </style>

    <!-- Font secondario -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- ✅ CSS collegato correttamente -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else if (savedTheme === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
</head>

<body class="home">

    <header>
        <img src="/profile.jpg" alt="Giovanni Duminuco" class="profile-photo">

        <div class="header-content">
            <div class="title-row">
                <a class="title" href="/">
                    <h1>Giovanni Duminuco, <span class="phd-text">Ph.D.</span></h1>
                </a>

                <button id="theme-toggle" aria-label="Cambia tema">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                    </svg>

                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3"></path>
                    </svg>
                </button>
            </div>

            <nav>
                <a href="/bio">Bio</a>
                <a href="/blog">Appunti</a>
                <a href="mailto:giovanni.duminuco@gmail.com">Contatto</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-container">
            <span>&copy; {{ "now" | date: "%Y" }} Giovanni Duminuco</span>

            <div class="footer-nav">
                <a href="/info">Info</a>
                <a href="https://www.linkedin.com/in/dumgio/" target="_blank">LinkedIn</a>
                <a href="https://scholar.google.com/citations?user=lpBSylMAAAAJ&hl=it" target="_blank">Scholar</a>
            </div>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');

        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        });
    </script>

</body>
</html>
